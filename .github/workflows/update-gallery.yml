name: Update cinematic gallery

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          python3 -m pip install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install app dependencies
        run: npm ci

      - name: Discover and ingest new frames
        env:
          RESULTS_PER_QUERY: "1"
          MAX_FRAMES_PER_VIDEO: "8"
          MIN_FRAME_SCORE: "38"
        run: npm run refresh

      - name: Commit gallery updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/bestframes
          if git diff --cached --quiet; then
            echo "No gallery changes to commit."
          else
            git commit -m "Auto update cinematic gallery"
            git push
          fi
